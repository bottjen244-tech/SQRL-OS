name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *" # build at 06:00 UTC every day
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true

  # --- NEW ISO GENERATION JOB START ---
  generate-iso:
    name: Generate ISO
    needs: bluebuild # This ensures the ISO only builds if the image build works
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Generate ISO
        uses: jasonn3/build-container-installer@v1.2.4
        with:
          # Replace YOUR_GITHUB_USERNAME with your actual username below
          image_name: sqrl-os
          image_repo: ghcr.io/bottjen244-tech
          image_tag: latest
          version: 41
          variant: 'Kinoite' # Because you are using KDE
          arch: x86_64
          # This enables the NVIDIA drivers in the installer
          extra_boot_params: 'inst.sdboot=1'
